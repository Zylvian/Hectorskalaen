<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Hectorskalaen favicon – Bryggen house with smell</title>
  <desc id="desc">
    Single Bryggen-style wooden house in warm colors with a playful smell line rising above the roof.
  </desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="60%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>
    <linearGradient id="houseBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
  </defs>

  <!-- sky background -->
  <rect x="0" y="0" width="64" height="64" fill="url(#sky)" />

  <!-- quay -->
  <rect x="0" y="44" width="64" height="20" fill="#1f2937" opacity="0.85" />

  <!-- single Bryggen-style house -->
  <!-- roof -->
  <path d="M16 44 L32 20 L48 44 Z" fill="#7f1d1d" />
  <!-- facade -->
  <rect x="20" y="26" width="24" height="18" fill="url(#houseBody)" />

  <!-- door -->
  <rect x="29" y="34" width="6" height="10" rx="0.8" fill="#111827" opacity="0.9" />

  <!-- windows -->
  <g fill="#fefce8">
    <rect x="22.5" y="29" width="4" height="4" rx="0.5" />
    <rect x="31" y="29" width="4" height="4" rx="0.5" />
    <rect x="39.5" y="29" width="4" height="4" rx="0.5" />
  </g>

  <!-- stink / smell line rising above the roof -->
  <path
    d="M37 23
       c2 -2 3 -4 3 -6
       c0 -2 -0.9 -3.5 -1.9 -4.6
       M32 21
       c1.6 -1.3 2.6 -2.9 2.6 -4.7
       c0 -1.6 -0.7 -2.8 -1.5 -3.7"
    fill="none"
    stroke="#fefce8"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.95"
  />
</svg>

