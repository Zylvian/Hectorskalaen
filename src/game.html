<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hectorskalaen – Guess the Rating</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-root">
      <header class="app-header">
        <div class="header-main">
          <h1>Hectorskalaen</h1>
          <p class="tagline">Guess the rating — how bad does it smell?</p>
        </div>
        <div class="header-controls">
          <a class="btn-ghost" href="index.html">
            Back to list
          </a>
        </div>
      </header>

      <main class="app-main">
        <section class="panel panel-game" data-mode="game">
          <header class="panel-header panel-header-game">
            <div>
              <h2>Guess the Hectorskalaen</h2>
              <p class="results-summary" id="gameSummary">
                Pick a number between 1 and 10.
              </p>
            </div>
          </header>

          <div class="game-area">
            <div class="game-card" id="gameCard">
              <div class="game-image" id="gameImage"></div>
              <div class="game-info">
                <h3 id="gameTitle"></h3>
                <p id="gameHint" class="game-hint"></p>
                <div class="game-input-row">
                  <label for="guessInput" class="sr-only">Your guess</label>
                  <input
                    id="guessInput"
                    type="number"
                    min="1"
                    max="10"
                    placeholder="1–10"
                    autocomplete="off"
                  />
                  <button id="guessSubmit" class="btn-ghost" type="button">
                    Guess
                  </button>
                </div>
                <p id="guessFeedback" class="guess-feedback"></p>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <p>
          For uenigheter eller nye inklusjoner, send mail til: <br />
          <a href="mailto:etmeg@hectorskalaen.no">etmeg@hectorskalaen.no</a>
        </p>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
