<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hectorskalaen – Hvor Shitty Lukter Denne Bergenske Baren?</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-root">
      <header class="app-header">
        <div class="header-main">
          <h1>Hectorskalaen</h1>
          <p class="tagline">
            Hectorskalaen er en skala fra 1-10 på hvor shit en bar i Bergen lukter.
          </p>
        </div>
        <div class="header-controls">
          <div class="search-group">
            <label for="searchInput">Søk etter bar</label>
            <input
              type="search"
              id="searchInput"
              placeholder="Søk…"
              autocomplete="off"
            />
          </div>
        </div>
      </header>

      <main class="app-main">
        <section class="panel panel-list" data-mode="browse">
          <header class="panel-header panel-header-list">
            <div>
              <h2>Barer i Bergen på Hectorskalaen</h2>
              <p id="resultsSummary" class="results-summary">
                Discover how Bergen’s bars rank on the Hectorskalaen.
              </p>
            </div>
            <div class="list-actions">
              <a class="btn-ghost" href="game.html" target="_blank" rel="noopener noreferrer">
                Play game
              </a>
              <div class="view-toggle-group" aria-label="Change layout" role="group">
                <button
                  id="viewGrid"
                  class="btn-ghost btn-toggle btn-toggle--active"
                  type="button"
                >
                  Grid
                </button>
                <button
                  id="viewList"
                  class="btn-ghost btn-toggle"
                  type="button"
                >
                  List
                </button>
              </div>
              <button id="sortToggle" class="btn-ghost" type="button">
                Sort: smell high → low
              </button>
            </div>
          </header>

          <div class="bars-scroll-wrapper">
            <ul id="barsList" class="bars-list"></ul>
          </div>
        </section>

      </main>

      <footer class="app-footer">
        <p>
          For uenigheter eller nye inklusjoner, send mail til: <br>
          <a href="mailto:etmeg@hectorskalaen.no">etmeg@hectorskalaen.no</a>
        </p>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
